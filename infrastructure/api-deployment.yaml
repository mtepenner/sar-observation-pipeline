apiVersion: apps/v1
kind: Deployment
metadata:
  name: spatial-api
  labels:
    app: spatial-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spatial-api
  template:
    metadata:
      labels:
        app: spatial-api
    spec:
      containers:
        - name: spatial-api
          image: sar-spatial-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: url
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: spatial-api
spec:
  selector:
    app: spatial-api
  ports:
    - port: 80
      targetPort: 8000
